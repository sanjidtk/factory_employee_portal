<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FactoryHRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background-color: #1E3A5F;
            color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: none;
        }
        .btn-amber {
            background-color: #F4A200;
            color: #1E3A5F;
            font-weight: bold;
            border: none;
        }
        .btn-amber:hover {
            background-color: #d68e00;
            color: #1E3A5F;
        }
        .text-amber {
            color: #F4A200;
        }
        .form-control {
            background-color: rgba(255, 255, 255, 0.9);
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(244, 162, 0, 0.25);
            border-color: #F4A200;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card login-card p-4">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <h2 class="text-amber fw-bold mt-2 mb-1">FactoryHRMS</h2>
                            <p class="text-white-50">Portal Authentication</p>
                        </div>
                        
                        {% if form.errors %}
                        <div class="alert alert-danger p-2 text-center" role="alert">
                            Invalid username or password.
                        </div>
                        {% endif %}

                        <form method="POST" action="{% url 'login' %}">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="id_username" class="form-label text-light">Username</label>
                                <input type="text" name="username" id="id_username" class="form-control form-control-lg" placeholder="Enter Username" required autofocus>
                            </div>
                            <div class="mb-4">
                                <label for="id_password" class="form-label text-light">Password</label>
                                <input type="password" name="password" id="id_password" class="form-control form-control-lg" placeholder="Enter Password" required>
                            </div>
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-amber btn-lg">Sign In</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
